<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Localizador de Ciudades</title>
</head>
<body>
    <script>
        let ciudadesa  = ["Bogota", "Lima", "Santiago", "Cali", "Madrid"];
let encontrada = false;
        let buscarCiudad =  prompt("Ingrese el nombre de la Ciudad")

        for(let f=0; f<ciudadesa.length; f++){
           if(buscarCiudad.toLowerCase()===ciudadesa[f].toLowerCase()){
            document.writeln("Ciudad: ", " " , ciudadesa[f], " Posicion: ", f)
            encontrada = true;
            break;
           }
        }
        if (encontrada === false) {
        document.writeln("Error: La ciudad '" + buscarCiudad + "' no aparece en nuestra lista.");
    }

    </script>
</body>
</html>
