<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let numero = parseInt(prompt("Ingresa el siguiente numero"));

        for (let i = 10; i >= 1; i--) {
            document.write(numero + " * " + i + " = " + (numero * i) + "<br>");
        }
    </script>
</body>

</html>
