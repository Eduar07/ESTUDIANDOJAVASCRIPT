<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let frase = prompt("Porfavor ingresar la frase")

        let nuevaVariable = "";


        for(let f in frase){
           if(frase[f] === " "){
            continue;
           }
           nuevaVariable += frase[f];
        }

        document.write("Resultado: " + nuevaVariable);
    </script>

</body>
</html>
