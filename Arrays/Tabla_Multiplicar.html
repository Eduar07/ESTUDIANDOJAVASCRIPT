<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let tabla = parseInt(prompt("¿Qué tabla quieres ver?"))

        for(let f=0; f<=10; f++){
         let res = tabla *f;
         document.write(tabla + " x " + f + " = " + res + "<br>");
        }
        
    </script>
</body>
</html>
