<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let precios = [100, 500, 200, 500, 300];


        for(f=0; f<precios.length; f++){
            if(precios[f] === 500){
                precios[f] = 600;
            }
        }
        document.writeln("Datos actualizados ", precios)
    </script>
</body>
</html>
