<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let saldos = [200, 450, -50, 800, -120];

        let numerosNegativos = 0;

        let alerta = false;

        for (let f = 0; f < saldos.length; f++) {
            if (saldos[f] < 0) {
                numerosNegativos++;
                alerta = true;
            }
        }

        if(alerta){
            document.writeln("Encontramos ", numerosNegativos, " Alerta")
        }else{
            document.writeln("No encontramos numeros negativos")
        }

    </script>
</body>

</html>
