<body>
    <script>
        let a = parseInt(prompt("Digite el primer numero"));
        let b = parseInt(prompt("Digite el segundo numero"));
        let c = parseInt(prompt("Digite el tercer numero"));

        if(a > b && a > c){
            document.write("El numero mayor es: ", a);
        }else{
            if((b > a && b > c)){
            document.write("El numero mayor es: ", b);
            }else{
                if((c > a && c > b)){
                  document.write("El numero mayor es: ", c);  
                }else{
                document.write("Numeros iguales ")
            }
            }
        }

    </script>
</body>
