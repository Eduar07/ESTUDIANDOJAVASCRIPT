<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let nota = parseInt(prompt("Ingresa una nota del 1 al 100"))


        if(nota >= 90 && nota <= 100){
            document.write("Excelente ");
        }else if(nota >= 70 && nota <= 89){
            document.writeln("Bueno");
        }else if(nota >= 0 && nota <= 69){
            document.writeln("Reprobado");
        }else{
            document.writeln("Numero ingresado invalido");
        }
    </script>
</body>
</html>
