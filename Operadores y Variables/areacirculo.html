<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let radio = parseFloat(prompt("Ingrese el radio"));

        let resultado = Math.PI * (radio ** 2);
        document.writeln("El area del circulo es: ", resultado)


        document.writeln("<br>");

        document.writeln("El area del circulo es: ", resultado.toFixed(2))
    </script>
</body>

</html>
