<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>

        let a = 1;
        document.write("Valor de a: ", a);
        document.write("<br>");
        a++;
        document.write("Valor de a: ", a);
        document.write("<br>");
        a += 5;
        document.write("Valor de a: ", a);
        document.write("<br>");
        a--;
        document.write("Valor de a: ", a);
        document.write("<br>");
        a -= 3;
        document.write("Valor de a: ", a);
        document.write("<br>");
        a *= 2;
        document.write("Valor de a: ", a);
        document.write("<br>");
        a /= 3;
        document.write("Valor de a: ", a);
        document.write("<br>");
        a **= 2;
        document.write("Valor de a: ", a);
        document.write("<br>");

    </script>
</body>

</html>
