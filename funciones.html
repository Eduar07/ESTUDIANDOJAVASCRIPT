<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //redondear a siguiente entero en decimal .5
        var precio = Math.round(399.53);
        document.writeln("precio redondeado: ", precio);
        document.writeln("<br>");
        
        //redondear sin importar decimal hacia arriiba
        var precio = Math.ceil(299.4);
        document.writeln("Precio redondeado: ", precio);
        document.writeln("<br>");
       
        //redondear sin importar decimal hacia abajo
        var precio = Math.floor(540.9);
        document.writeln("precio redondeado: ", precio)
        document.writeln("<br>")

        //calcular el seno de un angulo
        var seno = Math.sin(45);
        document.writeln("seno de 45: " , seno);
        document.writeln("<br>");

        //calcular el exponencial de un numero
        var expo = Math.exp(2);
        document.writeln("Exponencail de 2: " , expo)

        //calcular el logaritmo de un numero

        var logaritmo = Math.log(10);
        document.writeln("logaritmo de 10: ", logaritmo)

        //valor absuloto de un numero

        var absoluto = Math.abs(-10);
        document.writeln("v absoluto  de -10: ", absoluto);
        document.writeln("<br>");

        //calcular valor maximo de secuencua
        var maximo = Math.max(10,50,600,1,8);
        document.writeln("Mayor valor: ", maximo);
        document.writeln("<br>");

        //calcular valor minimo de secuencia
        var minimo = Math.min(10,50, 600,1,8);
        document.writeln("menor valor: ", minimo)
        document.writeln("<br>");

        //traer en pantalla valor aleatorio
        var aleatorio = Math.random()*10
        document.writeln("valor aleatorio: ", aleatorio)
        document.writeln("<br>");

        //raiz cuadrada de un numero
        var valor = Math.sqrt(81);
        document.writeln("raiz de 81: ", valor)
        document.write("<br>")

        //calcular el exponente de un numero

        var exponente = Math.pow(4,2);
        document.writeln("valor de 4 a la 2: ", exponente)


    </script>
</body>
</html>
