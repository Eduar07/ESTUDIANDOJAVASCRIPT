<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let a, b, sum, res, mult, div, resid, poten;

        //pedir datos al usuario

        a = parseInt(prompt("ingrese valor 1...."));
        b = parseInt(prompt("ingrese valor 2..."));

        //suma
        suma = a + b;
        res = a - b;
        mult = a * b;
        div = a / b;
        resid = a % b;
        poten = a ** b;

        document.writeln("La suma es: ", suma);
        document.write("<br>");
        document.writeln("La resta es: ",  res);
        document.write("<br>");
        document.writeln("La div es: ", mult);
        document.write("<br>");
        document.writeln("La resid es: ", div);
        document.write("<br>");
        document.writeln("La residuo4 es: ", resid);
         document.write("<br>");
        document.writeln("La potencia es: ", poten);
    </script>
</body>

</html>
